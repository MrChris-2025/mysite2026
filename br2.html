<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aintThatBETTER - TV Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,700;1,300;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#8834ec', // Purple accent
                            hover: '#7022d4',
                            dark: '#06040a',    // Ultra-dark background
                            card: '#130e20',    // Slate violet-black card color
                            cardHover: '#1c1530',
                            sidebar: '#110a1c',
                            glass: 'rgba(19, 14, 32, 0.7)',
                            purple: {
                                650: '#8834ec'
                            }
                        }
                    },
                    boxShadow: {
                        'glow': '0 0 25px rgba(136, 52, 236, 0.35)',
                        'glow-sm': '0 0 12px rgba(136, 52, 236, 0.2)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            background-color: #06040a;
            background-image: radial-gradient(circle at 50% -20%, #1a0836 0%, #06040a 60%);
            color: #e2e8f0;
            user-select: none;
        }
        
        .font-bold, h1, h2, h3, h4, button, select, label {
            font-weight: 700 !important;
        }

        .tv-viewport {
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(13, 8, 22, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .glass-card {
            background: rgba(19, 14, 32, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: #8834ec;
            border-radius: 3px;
        }

        .tv-focusable {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tv-focusable:hover, .tv-focusable:focus-within {
            transform: scale(1.02);
            background: rgba(30, 20, 52, 0.9);
            box-shadow: 0 0 30px rgba(136, 52, 236, 0.45);
        }

        #carouselTrack {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #continueWatchingTrack {
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body class="tv-viewport flex flex-col p-6 font-sans">

    <header class="flex items-center justify-between gap-6 mb-5 shrink-0 z-10">
        <div class="flex flex-col">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-brand tracking-tight drop-shadow-[0_2px_10px_rgba(136,52,236,0.3)]">
                aintThat<span class="text-brand">BETTER</span>
            </h1>
        </div>

        <div class="flex items-center gap-4 flex-grow max-w-2xl justify-center">
            <div class="relative w-40 flex items-center">
                <input id="searchInput" type="text" placeholder="Search..." 
                    class="w-full bg-brand-card rounded-xl px-3 py-2.5 pl-9 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand shadow-glow-sm tv-focusable"
                    onkeypress="if(event.key === 'Enter') handleSearch()">
                <button onclick="handleSearch()" class="absolute left-3 text-brand hover:text-white transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </button>
            </div>
            
            <div class="flex bg-brand-card rounded-xl p-1 shrink-0">
                <button id="toggleTV" onclick="setContentType('tv')" 
                    class="px-5 py-2 rounded-lg text-xs transition-all bg-brand text-white shadow-glow">
                    TV Shows
                </button>
                <button id="toggleMovie" onclick="setContentType('movie')" 
                    class="px-5 py-2 rounded-lg text-xs transition-all text-slate-400 hover:text-white">
                    Movies
                </button>
            </div>
        </div>

        <div class="bg-brand-card rounded-2xl px-6 py-2.5 flex flex-col items-end text-right min-w-[160px] shrink-0">
            <span id="liveTime" class="text-lg text-brand tracking-wider font-bold drop-shadow-[0_0_8px_rgba(136,52,236,0.5)]">12:00 PM</span>
            <span id="liveDate" class="text-[10px] text-slate-400 uppercase tracking-widest">Loading...</span>
        </div>
    </header>

    <div class="flex flex-col flex-grow overflow-hidden gap-6">

        <section id="playerContainer" class="hidden shrink-0 bg-brand-card rounded-2xl p-5 shadow-glow transition-all duration-300">
            <div class="grid grid-cols-12 gap-6 items-stretch">
                
                <div class="col-span-8 flex flex-col justify-between">
                    <div id="player-wrapper" class="relative w-full aspect-video rounded-xl overflow-hidden bg-black shadow-inner"></div>

                    <div class="flex items-center justify-between mt-3">
                        <div class="flex items-center gap-2">
                            <button onclick="toggleFullscreen()" class="px-4 py-2 bg-brand-sidebar hover:bg-brand-cardHover rounded-lg text-xs flex items-center gap-1.5 text-slate-200 transition-all">
                                <svg class="w-4 h-4 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4h4m12 4V4h-4M4 16v4h4m12-4v4h-4"/></svg>
                                Fullscreen
                            </button>

                            <div class="relative">
                                <button id="sources-dropdown-btn" onclick="toggleSourcesDropdown()" class="px-4 py-2 bg-brand-sidebar hover:bg-brand-cardHover border border-white/5 rounded-lg text-xs flex items-center gap-2 text-purple-400 transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                                    <span id="selected-source-text">Select Server</span>
                                </button>
                                <div id="sources-menu-options" class="hidden absolute bottom-full mb-2 left-0 w-80 max-h-64 overflow-y-auto bg-brand-sidebar border border-brand/20 rounded-xl p-2.5 grid grid-cols-2 gap-1.5 shadow-2xl z-50"></div>
                            </div>
                        </div>
                        
                        <div class="flex gap-2">
                            <button id="playerPrevBtn" onclick="navigateEpisode(-1)" class="px-4 py-2 bg-brand-sidebar hover:bg-brand-cardHover rounded-lg text-xs text-slate-300 disabled:opacity-50 transition-all">
                                Previous
                            </button>
                            <button id="playerNextBtn" onclick="navigateEpisode(1)" class="px-4 py-2 bg-brand hover:bg-brand-hover rounded-lg text-xs text-white disabled:opacity-50 transition-all">
                                Next
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-span-4 bg-brand-sidebar rounded-xl p-5 flex flex-col justify-between overflow-y-auto">
                    <div class="flex flex-col gap-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <p id="playerSubtitle" class="text-[10px] text-brand uppercase tracking-wider">Season 1 • Episode 1</p>
                                <h3 id="episodeTitleHeader" class="text-base text-white mt-1">Episode Overview</h3>
                            </div>
                            <button onclick="closePlayer()" class="text-slate-400 hover:text-white p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>

                        <div class="flex flex-col gap-3 bg-black/40 p-3 rounded-xl">
                            <div class="grid grid-cols-2 gap-2">
                                <div id="seasonSelectorWrapper" class="flex flex-col gap-1">
                                    <label class="text-[9px] uppercase text-slate-400 tracking-wider">Season</label>
                                    <select id="seasonSelector" onchange="handleSeasonChange()" 
                                        class="w-full bg-brand-sidebar rounded-lg p-2 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand">
                                    </select>
                                </div>

                                <div id="episodeSelectorWrapper" class="flex flex-col gap-1">
                                    <label class="text-[9px] uppercase text-slate-400 tracking-wider">Episode</label>
                                    <select id="episodeSelector" onchange="handleEpisodeChange()" 
                                        class="w-full bg-brand-sidebar rounded-lg p-2 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand">
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="text-xs text-slate-400 leading-relaxed font-light">
                            <label class="text-[9px] uppercase text-slate-500 tracking-wider block mb-1">Description</label>
                            <p id="episodeOverviewText" class="max-h-24 overflow-y-auto pr-2">
                                Select a title to begin playback.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-12 gap-6 flex-grow overflow-hidden items-stretch">
            
            <section class="col-span-8 flex flex-col h-full overflow-hidden">
                <div class="flex items-center justify-between mb-4 shrink-0">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-6 bg-brand rounded-full shadow-glow"></div>
                        <div>
                            <h2 class="text-xl text-white tracking-tight flex items-center gap-2">
                                Gallery
                                <span id="galleryCount" class="text-xs text-slate-300 bg-brand-card px-3 py-1 rounded-full ml-1">
                                    0 items
                                </span>
                            </h2>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <button onclick="carouselPrevPage()" class="p-2 bg-brand-card hover:bg-brand rounded-lg text-slate-300 hover:text-white transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/></svg>
                        </button>
                        
                        <span id="pageIndicator" class="text-xs bg-brand-card text-slate-300 px-4 py-2 rounded-lg">
                            Page 1
                        </span>

                        <button onclick="carouselNextPage()" class="p-2 bg-brand-card hover:bg-brand rounded-lg text-slate-300 hover:text-white transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                    </div>
                </div>

                <div id="verticalCarouselFrame" class="relative flex-grow overflow-hidden rounded-2xl select-none touch-pan-x">
                    <div id="carouselTrack" class="absolute inset-0 flex flex-col h-full w-full"></div>
                </div>
            </section>

            <aside class="col-span-4 glass-panel rounded-3xl p-5 flex flex-col h-full overflow-hidden shadow-2xl">
                <div class="flex items-center justify-between mb-4 pb-3 border-b border-brand/10 shrink-0">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <h3 class="text-slate-200 tracking-wider text-xs uppercase">Continue Watching</h3>
                    </div>
                    <button onclick="clearContinueWatching()" class="text-xs text-brand hover:text-purple-300 hover:underline transition-all">
                        Clear History
                    </button>
                </div>

                <div id="continueWatchingWindow" class="relative flex-grow overflow-hidden touch-pan-y">
                    <div id="continueWatchingTrack" class="absolute inset-0 flex flex-col gap-3 w-full"></div>
                </div>
            </aside>

        </div>
    </div>

    <div id="appToast" class="fixed bottom-6 right-6 glass-panel p-4 rounded-2xl shadow-glow translate-y-20 opacity-0 transition-all duration-300 max-w-sm z-50">
        <p id="appToastText" class="text-xs text-slate-200"></p>
    </div>

    <script>
        const TMDB_API_KEY = "1070730380f5fee0d87cf0382670b255";
        const TMDB_BASE_URL = "https://api.themoviedb.org/3";
        const IMAGE_BASE_URL = "https://image.tmdb.org/t/p/w500";

        const OFFLINE_BACKUP_TV = [
            { id: 119051, name: "Wednesday", first_air_date: "2022", overview: "Wednesday Addams' misadventures as a student at Nevermore Academy, a unique boarding school." },
            { id: 121043, name: "From", first_air_date: "2022", overview: "Unravel the mystery of a nightmarish town in middle America that traps all those who enter." },
            { id: 100088, name: "The Last of Us", first_air_date: "2023", overview: "Twenty years after modern civilization has been destroyed, Joel is hired to smuggle Ellie out." },
            { id: 1396, name: "Breaking Bad", first_air_date: "2008", overview: "A high school chemistry teacher diagnosed with inoperable lung cancer turns to manufacturing meth." }
        ];

        const OFFLINE_BACKUP_MOVIES = [
            { id: 1111873, title: "Oppenheimer", release_date: "2023", overview: "The story of J. Robert Oppenheimer's role in the development of the atomic bomb." },
            { id: 414906, title: "The Batman", release_date: "2022", overview: "In his second year of fighting crime, Batman uncovers corruption in Gotham City." },
            { id: 671, title: "Harry Potter and the Sorcerer's Stone", release_date: "2001", overview: "An orphaned boy enrolls in a school of wizardry, where he learns the truth about himself." },
            { id: 19995, title: "Avatar", release_date: "2009", overview: "A paraplegic Marine dispatched to the moon Pandora on a unique mission becomes torn between directions." }
        ];

        const serversList = [
            { id: 'vixsrc', name: 'Server 1: Vixsrc' },
            { id: 'vault', name: 'Server 2: Vault' },
            { id: 'xpass', name: 'Server 3: XPass' },
            { id: 'vaplayer', name: 'Server 4: VAPlayer' },
            { id: 'filmu', name: 'Server 5: Filmu' },
            { id: 'videasy', name: 'Server 6: Videasy' },
            { id: 'vidfast', name: 'Server 7: VidFast' },
            { id: 'cinemaos', name: 'Server 8: CinemaOS' },
            { id: 'spencerdevs', name: 'Server 9: SpencerDevs' },
            { id: 'vyla', name: 'Server 10: Vyla' },
            { id: 'cinezo', name: 'Server 11: Cinezo' },
            { id: 'oneembed', name: 'Server 12: 1Embed' }
        ];

        const noSandboxSources = ['vixsrc', 'xpass', 'videasy', 'vidfast'];
        let activeServer = "videasy"; 

        let currentContentType = 'tv';
        let searchQuery = '';
        let localFilteredItems = []; 
        let localCurrentPage = 1;
        const ITEMS_PER_PAGE = 4;

        let tmdbCurrentPage = 1;
        let tmdbTotalPages = 1;
        const ALLOWED_COUNTRIES = ['US', 'GB', 'CA', 'AU', 'NZ', 'ZA', 'UK'];

        let state = {
            current: null,
            type: 'tv'
        };

        let currentTvDetails = {
            id: null,
            season: 1,
            episode: 1,
            totalEpisodes: 0
        };

        let cachedSeasonEpisodes = [];

        let galleryTouchStartY = 0;
        let galleryTouchEndY = 0;
        let continueTouchStartX = 0;
        let continueTouchEndX = 0;
        let currentContinuePage = 0; 

        window.addEventListener('DOMContentLoaded', () => {
            initializeClock();
            populateSourcesDropdown();
            loadGalleryData(true);
            renderContinueWatching();
            setupTouchGestures();

            document.addEventListener('click', (e) => {
                const menu = document.getElementById("sources-menu-options");
                const btn = document.getElementById("sources-dropdown-btn");
                if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
                    menu.classList.add("hidden");
                }
            });
        });

        function initializeClock() {
            function updateClock() {
                const now = new Date();
                let hours = now.getHours();
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                
                document.getElementById('liveTime').textContent = `${hours}:${minutes} ${ampm}`;

                const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
                document.getElementById('liveDate').textContent = now.toLocaleDateString('en-US', options);
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        function toggleSourcesDropdown() {
            const menu = document.getElementById("sources-menu-options");
            if (menu) {
                menu.classList.toggle("hidden");
            }
        }

        function populateSourcesDropdown() {
            const menu = document.getElementById("sources-menu-options");
            if (!menu) return;
            menu.innerHTML = "";
            serversList.forEach(server => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.setAttribute("draggable", "false");
                
                const isActive = server.id === activeServer;
                
                btn.className = `p-2.5 rounded-lg text-[10px] transition-all duration-200 flex flex-col items-center justify-center text-center gap-1 border border-white/5 cursor-pointer outline-none ${
                    isActive 
                    ? 'bg-purple-600/30 border-purple-500 text-white shadow-lg shadow-purple-500/10' 
                    : 'bg-white/5 text-slate-300 hover:border-purple-500/50 hover:bg-white/10 hover:text-white'
                }`;

                btn.onclick = () => {
                    selectServer(server.id);
                    menu.classList.add("hidden");
                };

                const nameParts = server.name.split(': ');
                const label = nameParts[0] || 'Server';
                const source = nameParts[1] || server.id;

                btn.innerHTML = `
                    <span class="text-[8px] uppercase tracking-wider text-purple-400">${label}</span>
                    <span class="text-white truncate max-w-full">${source}</span>
                `;
                menu.appendChild(btn);
            });
            updateSelectedSourceText();
        }

        function updateSelectedSourceText() {
            const active = serversList.find(s => s.id === activeServer);
            const sourceTextEl = document.getElementById("selected-source-text");
            if (sourceTextEl) {
                sourceTextEl.textContent = active ? active.name : "Select Server";
            }
        }

        function selectServer(serverName) {
            activeServer = serverName;
            updateSelectedSourceText();
            populateSourcesDropdown();

            if (state.current) {
                if (state.type === "tv") {
                    const s = document.getElementById('seasonSelector').value || 1;
                    const e = document.getElementById('episodeSelector').value || 1;
                    loadServerIframe("tv", state.current.id, s, e);
                } else {
                    loadServerIframe("movie", state.current.id);
                }
            }
        }

        function loadServerIframe(type, id, season = 1, episode = 1) {
            const playerContainer = document.getElementById("player-wrapper");
            if (!playerContainer) return;
            let streamUrl = "";

            if (type === "movie") {
                switch (activeServer) {
                    case "vixsrc": streamUrl = `https://vixsrc.to/movie/${id}`; break;
                    case "vault": streamUrl = `https://streamvaultsrc.click/embed/movie/${id}`; break;
                    case "xpass": streamUrl = `https://play.xpass.top/e/movie/${id}`; break;
                    case "vaplayer": streamUrl = `https://vaplayer.ru/embed/movie/${id}`; break;
                    case "filmu": streamUrl = `https://embed.filmu.in/movie/${id}`; break;
                    case "videasy": streamUrl = `https://player.videasy.net/movie/${id}?color=8834ec`; break;
                    case "vidfast": streamUrl = `https://www.vidfast.net/movie/${id}`; break;
                    case "cinemaos": streamUrl = `https://cinemaos.tech/player/${id}`; break;
                    case "spencerdevs": streamUrl = `https://spencerdevs.xyz/movie/${id}`; break;
                    case "vyla": streamUrl = `https://vyla.pages.dev/movie/${id}`; break;
                    case "cinezo": streamUrl = `https://api.cinezo.net/movie/${id}`; break;
                    case "oneembed": streamUrl = `https://1embed.cc/embed/movie/${id}`; break;
                    default: streamUrl = `https://vixsrc.to/movie/${id}`;
                }
            } else {
                switch (activeServer) {
                    case "vixsrc": streamUrl = `https://vixsrc.to/tv/${id}/${season}/${episode}`; break;
                    case "vault": streamUrl = `https://streamvaultsrc.click/embed/tv/${id}/${season}/${episode}`; break;
                    case "xpass": streamUrl = `https://play.xpass.top/e/tv/${id}/${season}/${episode}`; break;
                    case "vaplayer": streamUrl = `https://vaplayer.ru/embed/tv/${id}/${season}/${episode}`; break;
                    case "filmu": streamUrl = `https://embed.filmu.in/tv/${id}/${season}/${episode}`; break;
                    case "videasy": streamUrl = `https://player.videasy.net/tv/${id}/${season}/${episode}?autoplayNextEpisode=true&autoPlay=true&nextEpisode=true&color=8834ec`; break;
                    case "vidfast": streamUrl = `https://www.vidfast.net/tv/${id}/${season}/${episode}?autoPlay=true`; break;
                    case "cinemaos": streamUrl = `https://cinemaos.live/tv/watch/${id}&${season}&${episode}`; break;
                    case "spencerdevs": streamUrl = `https://spencerdevs.xyz/tv/${id}/${season}/${episode}`; break;
                    case "vyla": streamUrl = `https://vyla.pages.dev/tv/${id}/${season}/${episode}`; break;
                    case "cinezo": streamUrl = `https://api.cinezo.net/tv/${id}/${season}/${episode}?autoplayNext=true?startAt=630`; break;
                    case "oneembed": streamUrl = `https://1embed.cc/embed/tv/${id}/${season}/${episode}`; break;
                    default: streamUrl = `https://vixsrc.to/tv/${id}/${season}/${episode}`;
                }
            }

            const frameElement = document.createElement('iframe');
            frameElement.src = streamUrl;
            frameElement.className = "w-full h-full border-0 shadow-2xl bg-black rounded-lg";
            frameElement.allowFullscreen = true;
            frameElement.setAttribute("scrolling", "no");
            frameElement.setAttribute("referrerpolicy", "origin");
            frameElement.setAttribute("allow", "autoplay; encrypted-media; picture-in-picture");

            if (noSandboxSources.includes(activeServer)) {
                frameElement.removeAttribute('sandbox');
            } else {
                frameElement.setAttribute('sandbox', 'allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation');
            }

            playerContainer.innerHTML = "";
            playerContainer.appendChild(frameElement);
        }

        function setContentType(type) {
            currentContentType = type;
            document.getElementById('searchInput').value = '';
            searchQuery = '';

            const btnTV = document.getElementById('toggleTV');
            const btnMovie = document.getElementById('toggleMovie');

            if (type === 'tv') {
                btnTV.className = "px-5 py-2 rounded-lg text-xs transition-all bg-brand text-white shadow-glow";
                btnMovie.className = "px-5 py-2 rounded-lg text-xs transition-all text-slate-400 hover:text-white";
            } else {
                btnMovie.className = "px-5 py-2 rounded-lg text-xs transition-all bg-brand text-white shadow-glow";
                btnTV.className = "px-5 py-2 rounded-lg text-xs transition-all text-slate-400 hover:text-white";
            }

            loadGalleryData(true);
        }

        function handleSearch() {
            const input = document.getElementById('searchInput');
            searchQuery = encodeURIComponent(input.value.trim());
            loadGalleryData(true);
        }

        async function loadGalleryData(reset = true) {
            const track = document.getElementById('carouselTrack');
            if (reset) {
                track.style.transform = `translateY(0%)`;
                track.innerHTML = "";
                localFilteredItems = [];
                localCurrentPage = 1;
                tmdbCurrentPage = 1;
                tmdbTotalPages = 1;
            }

            let fetchCount = 0;
            const maxFetchAttempts = 3; 
            let loadSuccess = false;

            while (localFilteredItems.length < (localCurrentPage * ITEMS_PER_PAGE) && 
                   tmdbCurrentPage <= tmdbTotalPages && 
                   fetchCount < maxFetchAttempts) {
                
                fetchCount++;
                let url = searchQuery 
                    ? `${TMDB_BASE_URL}/search/${currentContentType}?api_key=${TMDB_API_KEY}&query=${searchQuery}&page=${tmdbCurrentPage}`
                    : `${TMDB_BASE_URL}/${currentContentType}/popular?api_key=${TMDB_API_KEY}&page=${tmdbCurrentPage}`;

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("API call error");
                    const data = await response.json();
                    
                    if (data.results && data.results.length > 0) {
                        tmdbTotalPages = data.total_pages;

                        const filtered = searchQuery ? data.results : data.results.filter(item => {
                            const originCountries = item.origin_country || [];
                            if (originCountries.length > 0) {
                                return originCountries.some(code => ALLOWED_COUNTRIES.includes(code.toUpperCase()));
                            }
                            return (item.original_language === 'en');
                        });

                        localFilteredItems.push(...filtered);
                        tmdbCurrentPage++;
                        loadSuccess = true;
                    } else {
                        break;
                    }
                } catch (err) {
                    break;
                }
            }

            if (!loadSuccess || localFilteredItems.length === 0) {
                const backup = (currentContentType === 'tv') ? OFFLINE_BACKUP_TV : OFFLINE_BACKUP_MOVIES;
                if (searchQuery) {
                    const decoded = decodeURIComponent(searchQuery).toLowerCase();
                    localFilteredItems = backup.filter(item => {
                        const title = (item.title || item.name || '').toLowerCase();
                        return title.includes(decoded);
                    });
                } else {
                    localFilteredItems = backup;
                }
            }

            renderGalleryGrid();
        }

        function renderGalleryGrid() {
            const track = document.getElementById('carouselTrack');
            track.innerHTML = '';

            const localTotalPages = Math.max(1, Math.ceil(localFilteredItems.length / ITEMS_PER_PAGE));
            document.getElementById('galleryCount').textContent = `${localFilteredItems.length} items`;
            document.getElementById('pageIndicator').textContent = `Page ${localCurrentPage} of ${localTotalPages}`;

            if (localFilteredItems.length === 0) {
                track.innerHTML = `
                    <div class="w-full h-full flex flex-col items-center justify-center py-16 text-slate-500">
                        <svg class="w-12 h-12 mb-2 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <p class="text-sm">No results found</p>
                        <p class="text-xs font-light">Try refining your search query</p>
                    </div>
                `;
                return;
            }

            for (let p = 0; p < localTotalPages; p++) {
                const pageNode = document.createElement('div');
                pageNode.className = "w-full h-full min-h-full max-h-full grid grid-cols-2 gap-4 flex-shrink-0 pb-1";
                
                const startIndex = p * ITEMS_PER_PAGE;
                const pageLimitItems = localFilteredItems.slice(startIndex, startIndex + ITEMS_PER_PAGE);

                pageLimitItems.forEach(item => {
                    const title = item.title || item.name || 'Untitled';
                    const backdrop = item.backdrop_path ? `${IMAGE_BASE_URL}${item.backdrop_path}` : 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=600&auto=format&fit=crop';
                    const year = (item.release_date || item.first_air_date || '').substring(0, 4) || '2026';
                    const summary = item.overview ? (item.overview.length > 95 ? item.overview.slice(0, 95) + '...' : item.overview) : 'No plot description available.';

                    pageNode.innerHTML += `
                        <div onclick="selectMediaItem(${item.id}, '${currentContentType}', '${title.replace(/'/g, "\\'")}')" 
                            class="tv-focusable cursor-pointer glass-card rounded-2xl overflow-hidden flex flex-col justify-between h-full">
                            
                            <div class="relative aspect-video w-full overflow-hidden bg-black shrink-0">
                                <img src="${backdrop}" alt="${title}" class="w-full h-full object-cover" loading="lazy">
                                <div class="absolute inset-0 bg-gradient-to-t from-brand-card via-transparent to-transparent"></div>
                                
                                <span class="absolute bottom-2.5 left-2.5 bg-black/70 text-[10px] text-slate-300 px-2 py-0.5 rounded">
                                    ${year}
                                </span>
                            </div>

                            <div class="p-4 flex-grow flex flex-col justify-between gap-1">
                                <div>
                                    <h3 class="text-sm text-slate-100 line-clamp-1 tracking-tight" title="${title}">${title}</h3>
                                    <p class="text-[11px] text-slate-400 line-clamp-2 leading-relaxed font-light mt-1">${summary}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
                track.appendChild(pageNode);
            }
            updateCarouselPosition();
        }

        function updateCarouselPosition() {
            const track = document.getElementById('carouselTrack');
            const offset = (localCurrentPage - 1) * 100;
            track.style.transform = `translateY(-${offset}%)`;
            
            const localTotalPages = Math.max(1, Math.ceil(localFilteredItems.length / ITEMS_PER_PAGE));
            document.getElementById('pageIndicator').textContent = `Page ${localCurrentPage} of ${localTotalPages}`;
        }

        async function carouselPrevPage() {
            if (localCurrentPage > 1) {
                localCurrentPage--;
                updateCarouselPosition();
            }
        }

        async function carouselNextPage() {
            const nextStartIndex = localCurrentPage * ITEMS_PER_PAGE;
            if (nextStartIndex < localFilteredItems.length) {
                localCurrentPage++;
                updateCarouselPosition();
            } else if (tmdbCurrentPage <= tmdbTotalPages) {
                localCurrentPage++;
                await loadGalleryData(false);
            }
        }

        function prepopulateTvControls(startSeason = 1, startEpisode = 1) {
            buildSeasonsDropdown(10);
            
            cachedSeasonEpisodes = Array.from({length: 24}, (_, i) => ({ 
                episode_number: i+1, 
                name: `Episode ${i+1}`,
                overview: "Episode summary loading..."
            }));
            currentTvDetails.totalEpisodes = 24;
            buildEpisodesDropdown(); 
            
            document.getElementById('seasonSelector').value = startSeason;
            document.getElementById('episodeSelector').value = startEpisode;
        }

        async function selectMediaItem(id, type, title, startSeason = 1, startEpisode = 1) {
            state.current = { id: id, title: title };
            state.type = type;

            const playerContainer = document.getElementById('playerContainer');
            playerContainer.classList.remove('hidden');
            playerContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

            if (type === 'tv') {
                currentTvDetails.id = id;
                currentTvDetails.season = parseInt(startSeason);
                currentTvDetails.episode = parseInt(startEpisode);

                document.getElementById('seasonSelectorWrapper').classList.remove('hidden');
                document.getElementById('episodeSelectorWrapper').classList.remove('hidden');
                document.getElementById('playerPrevBtn').classList.remove('hidden');
                document.getElementById('playerNextBtn').classList.remove('hidden');
                
                document.getElementById('playerSubtitle').textContent = `Season ${startSeason} • Episode ${startEpisode}`;

                prepopulateTvControls(startSeason, startEpisode);
                await fetchRealTvDetails(id, startSeason, startEpisode);
            } else {
                document.getElementById('seasonSelectorWrapper').classList.add('hidden');
                document.getElementById('episodeSelectorWrapper').classList.add('hidden');
                document.getElementById('playerPrevBtn').classList.add('hidden');
                document.getElementById('playerNextBtn').classList.add('hidden');
                
                document.getElementById('playerSubtitle').textContent = "Featured Film";
                document.getElementById('episodeOverviewText').textContent = "Retrieving details...";

                await fetchRealMovieDetails(id);
                loadServerIframe("movie", id);
            }

            document.getElementById('episodeTitleHeader').textContent = title;
            saveToContinueWatching(id, type, title, startSeason, startEpisode);
        }

        async function fetchRealMovieDetails(id) {
            try {
                const response = await fetch(`${TMDB_BASE_URL}/movie/${id}?api_key=${TMDB_API_KEY}`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('episodeOverviewText').textContent = data.overview || 'No description available.';
                }
            } catch (err) {}
        }

        async function fetchRealTvDetails(id, startSeason, startEpisode) {
            try {
                const response = await fetch(`${TMDB_BASE_URL}/tv/${id}?api_key=${TMDB_API_KEY}`);
                if (!response.ok) throw new Error("Metadata API request failed");
                const data = await response.json();

                const seasonsCount = data.number_of_seasons || 1;
                buildSeasonsDropdown(seasonsCount);
                await fetchEpisodesList();
            } catch (err) {
                loadServerIframe("tv", currentTvDetails.id, currentTvDetails.season, currentTvDetails.episode);
            }
        }

        function buildSeasonsDropdown(seasonsCount) {
            const selector = document.getElementById('seasonSelector');
            selector.innerHTML = '';
            for (let i = 1; i <= seasonsCount; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `Season ${i}`;
                if (i === parseInt(currentTvDetails.season)) opt.selected = true;
                selector.appendChild(opt);
            }
        }

        async function fetchEpisodesList() {
            try {
                const res = await fetch(`${TMDB_BASE_URL}/tv/${currentTvDetails.id}/season/${currentTvDetails.season}?api_key=${TMDB_API_KEY}`);
                if (!res.ok) throw new Error("Fallback required");
                const data = await res.json();
                
                cachedSeasonEpisodes = data.episodes || [];
                currentTvDetails.totalEpisodes = cachedSeasonEpisodes.length;
                buildEpisodesDropdown();
                updateActiveEpisodeUI();
                loadServerIframe("tv", currentTvDetails.id, currentTvDetails.season, currentTvDetails.episode);
            } catch (err) {
                cachedSeasonEpisodes = Array.from({length: 24}, (_, i) => ({ 
                    episode_number: i+1, 
                    name: `Episode ${i+1}`,
                    overview: "Episode summary unavailable offline."
                }));
                currentTvDetails.totalEpisodes = cachedSeasonEpisodes.length;
                buildEpisodesDropdown();
                updateActiveEpisodeUI();
                loadServerIframe("tv", currentTvDetails.id, currentTvDetails.season, currentTvDetails.episode);
            }
        }

        function buildEpisodesDropdown() {
            const selector = document.getElementById('episodeSelector');
            selector.innerHTML = '';
            
            if (cachedSeasonEpisodes.length === 0) {
                const opt = document.createElement('option');
                opt.value = 1;
                opt.textContent = "Episode 1";
                selector.appendChild(opt);
                return;
            }

            cachedSeasonEpisodes.forEach(ep => {
                const opt = document.createElement('option');
                opt.value = ep.episode_number;
                opt.textContent = `Ep ${ep.episode_number} - ${ep.name || ''}`;
                if (parseInt(ep.episode_number) === parseInt(currentTvDetails.episode)) opt.selected = true;
                selector.appendChild(opt);
            });
        }

        function updateActiveEpisodeUI() {
            if (currentContentType === 'tv') {
                const currentEpData = cachedSeasonEpisodes.find(ep => parseInt(ep.episode_number) === parseInt(currentTvDetails.episode));
                if (currentEpData) {
                    document.getElementById('episodeTitleHeader').textContent = currentEpData.name || `Episode ${currentTvDetails.episode}`;
                    document.getElementById('episodeOverviewText').textContent = currentEpData.overview || 'No summary available for this episode.';
                } else {
                    document.getElementById('episodeTitleHeader').textContent = state.current ? state.current.title : 'Episode Title';
                    document.getElementById('episodeOverviewText').textContent = 'No details available.';
                }
            }
        }

        async function handleSeasonChange() {
            currentTvDetails.season = parseInt(document.getElementById('seasonSelector').value);
            currentTvDetails.episode = 1;
            document.getElementById('playerSubtitle').textContent = `Season ${currentTvDetails.season} • Episode 1`;
            await fetchEpisodesList();
            saveToContinueWatching(currentTvDetails.id, 'tv', state.current.title, currentTvDetails.season, 1);
        }

        function handleEpisodeChange() {
            currentTvDetails.episode = parseInt(document.getElementById('episodeSelector').value);
            document.getElementById('playerSubtitle').textContent = `Season ${currentTvDetails.season} • Episode ${currentTvDetails.episode}`;
            updateActiveEpisodeUI();
            loadServerIframe("tv", currentTvDetails.id, currentTvDetails.season, currentTvDetails.episode);
            saveToContinueWatching(currentTvDetails.id, 'tv', state.current.title, currentTvDetails.season, currentTvDetails.episode);
        }

        function navigateEpisode(direction) {
            let nextEp = parseInt(currentTvDetails.episode) + direction;
            if (nextEp > 0 && nextEp <= currentTvDetails.totalEpisodes) {
                currentTvDetails.episode = nextEp;
                document.getElementById('episodeSelector').value = nextEp;
                document.getElementById('playerSubtitle').textContent = `Season ${currentTvDetails.season} • Episode ${currentTvDetails.episode}`;
                updateActiveEpisodeUI();
                loadServerIframe("tv", currentTvDetails.id, currentTvDetails.season, currentTvDetails.episode);
                saveToContinueWatching(currentTvDetails.id, 'tv', state.current.title, currentTvDetails.season, currentTvDetails.episode);
            } else if (direction > 0) {
                const seasonSelector = document.getElementById('seasonSelector');
                const nextSeason = parseInt(currentTvDetails.season) + 1;
                if (nextSeason <= seasonSelector.options.length) {
                    currentTvDetails.season = nextSeason;
                    currentTvDetails.episode = 1;
                    seasonSelector.value = nextSeason;
                    handleSeasonChange();
                } else {
                    showToast("No further seasons available.");
                }
            }
        }

        function closePlayer() {
            const wrapper = document.getElementById("player-wrapper");
            if (wrapper) {
                wrapper.innerHTML = "";
            }
            state.current = null;
            document.getElementById('playerContainer').classList.add('hidden');
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById("player-wrapper");
            if (!wrapper) return;
            
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            } else if (wrapper.webkitRequestFullscreen) {
                wrapper.webkitRequestFullscreen();
            } else if (wrapper.msRequestFullscreen) {
                wrapper.msRequestFullscreen();
            }
        }

        function saveToContinueWatching(id, type, title, season = 1, episode = 1) {
            let history = JSON.parse(localStorage.getItem('tv_stream_history') || '[]');
            
            const entry = {
                id: id,
                type: type,
                title: title,
                season: season,
                episode: episode,
                timestamp: Date.now()
            };

            history = history.filter(item => !(item.id === entry.id && item.type === entry.type));
            history.unshift(entry);
            
            if (history.length > 5) history.pop();

            localStorage.setItem('tv_stream_history', JSON.stringify(history));
            currentContinuePage = 0; 
            renderContinueWatching();
        }

        function renderContinueWatching() {
            const track = document.getElementById('continueWatchingTrack');
            const history = JSON.parse(localStorage.getItem('tv_stream_history') || '[]');

            if (history.length === 0) {
                track.style.transform = "translateX(0px)";
                track.innerHTML = `
                    <p class="text-xs text-slate-500 italic py-12 text-center w-full font-light">Your recently watched shows will display here.</p>
                `;
                return;
            }

            track.innerHTML = history.map(item => {
                const label = item.type === 'tv' ? `S${item.season} • Ep ${item.episode}` : 'Movie';
                return `
                    <div onclick="selectMediaItem(${item.id}, '${item.type}', '${item.title.replace(/'/g, "\\'")}', ${item.season || 1}, ${item.episode || 1})" 
                        class="tv-focusable cursor-pointer flex items-center justify-between p-3 bg-black/40 hover:bg-brand-sidebar rounded-2xl shadow-glow-sm w-full shrink-0 select-none">
                        
                        <div class="flex items-center gap-3 overflow-hidden pointer-events-none">
                            <div class="p-2.5 bg-brand/20 text-brand rounded-xl">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                            <div class="overflow-hidden">
                                <h4 class="text-xs text-slate-200 line-clamp-1">${item.title}</h4>
                                <p class="text-[10px] text-slate-400 mt-0.5 font-light">${label}</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-2">
                            <span class="text-[9px] text-white bg-brand shadow-glow px-2.5 py-1 rounded-md tracking-wider uppercase pointer-events-none">
                                Resume
                            </span>
                            <button onclick="event.stopPropagation(); removeHistoryItem(${item.id}, '${item.type}')" class="text-slate-500 hover:text-red-400 p-1 transition-colors relative z-30">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateContinueWatchingPosition();
        }

        function updateContinueWatchingPosition() {
            const track = document.getElementById('continueWatchingTrack');
            const win = document.getElementById('continueWatchingWindow');
            if(!track || !win) return;
            const step = win.clientHeight; 
            track.style.transform = `translateY(-${currentContinuePage * step}px)`;
        }

        function removeHistoryItem(id, type) {
            let history = JSON.parse(localStorage.getItem('tv_stream_history') || '[]');
            history = history.filter(item => !(item.id === id && item.type === type));
            localStorage.setItem('tv_stream_history', JSON.stringify(history));
            currentContinuePage = 0;
            renderContinueWatching();
            showToast("Item removed.");
        }

        function clearContinueWatching() {
            localStorage.removeItem('tv_stream_history');
            currentContinuePage = 0;
            renderContinueWatching();
            showToast("History cleared.");
        }

        function setupTouchGestures() {
            const galleryFrame = document.getElementById('verticalCarouselFrame');
            
            galleryFrame.addEventListener('touchstart', (e) => {
                galleryTouchStartY = e.touches[0].clientY;
            }, { passive: true });

            galleryFrame.addEventListener('touchend', (e) => {
                galleryTouchEndY = e.changedTouches[0].clientY;
                handleGallerySwipe();
            }, { passive: true });

            const continueWindow = document.getElementById('continueWatchingWindow');
            
            continueWindow.addEventListener('touchstart', (e) => {
                continueTouchStartX = e.touches[0].clientY;
            }, { passive: true });

            continueWindow.addEventListener('touchend', (e) => {
                continueTouchEndX = e.changedTouches[0].clientY;
                handleContinueSwipe();
            }, { passive: true });
        }

        function handleGallerySwipe() {
            const threshold = 50; 
            const diff = galleryTouchStartY - galleryTouchEndY;
            
            if (diff > threshold) {
                carouselNextPage();
            } else if (diff < -threshold) {
                carouselPrevPage();
            }
        }

        function handleContinueSwipe() {
            const threshold = 40;
            const diff = continueTouchStartX - continueTouchEndX;
            const history = JSON.parse(localStorage.getItem('tv_stream_history') || '[]');
            const maxPages = Math.ceil(history.length / 4); 

            if (diff > threshold) {
                if (currentContinuePage < maxPages - 1) {
                    currentContinuePage++;
                    updateContinueWatchingPosition();
                }
            } else if (diff < -threshold) {
                if (currentContinuePage > 0) {
                    currentContinuePage--;
                    updateContinueWatchingPosition();
                }
            }
        }

        function showToast(message) {
            const toast = document.getElementById('appToast');
            const text = document.getElementById('appToastText');
            if(!toast || !text) return;
            text.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }
    </script>
</body>
</html>
