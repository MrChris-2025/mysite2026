            { id: 'oneembed', name: 'Server 12: 1Embed' }
        ];

        const noSandboxSources = ['vixsrc', 'xpass', 'videasy', 'vidfast'];
        const allowedCountries = ['US', 'GB', 'AU', 'NZ', 'ZA', 'CA'];

        let state = { 
            user: null, 
            type: 'movie', 
            page: 1, 
            query: '', 
            history: {}, 
            permanentWatched: {}, 
            liveDetails: {}, 
            genre: '', 
            year: '' 
        };
        
        let galleryData = [];
        let saveTimeout = null;
        let scrollInterval = null;

        function formatTimeTo12Hour(timeString) {
            if (!timeString) return '';
            const [hourStr, minuteStr] = timeString.split(':');
            let hour = parseInt(hourStr);
            const minute = minuteStr || '00';
            const ampm = hour >= 12 ? 'PM' : 'AM';
            hour = hour % 12;
            hour = hour ? hour : 12;
            return `${hour}:${minute} ${ampm}`;
        }

        function updateClock() {
            const clockEl = document.getElementById('clock');
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            clockEl.textContent = `${hours}:${minutes} ${ampm}`;
        }

        function toggleAutoscroll() {
            const btn = document.getElementById('autoscrollBtn');
            if (scrollInterval) {
                clearInterval(scrollInterval);
                scrollInterval = null;
                btn.classList.remove('bg-purple-600', 'text-white');
                btn.classList.add('bg-white/5', 'text-purple-400');
            } else {
                btn.classList.remove('bg-white/5', 'text-purple-400');
                btn.classList.add('bg-purple-600', 'text-white');
                scrollInterval = setInterval(() => {
                    window.scrollBy({ top: 1, behavior: 'auto' });
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
                        toggleAutoscroll();
                    }
                }, 30);
            }
        }

        async function fetchUpcomingDatingShows() {
            const grid = document.getElementById('calendarGrid');
            try {
                const response = await fetch('https://api.tvmaze.com/schedule/full');
                if (!response.ok) throw new Error();
                const fullSchedule = await response.json();
                
                const now = new Date();
                now.setHours(0,0,0,0);
                const oneWeekLater = new Date();
                oneWeekLater.setDate(now.getDate() + 7);
                
                const filtered = fullSchedule.filter(item => {
                    if (!item._embedded || !item._embedded.show) return false;
                    const show = item._embedded.show;
                    
                    const countryCode = show.network?.country?.code || show.webChannel?.country?.code || '';
                    if (countryCode && !allowedCountries.includes(countryCode)) return false;

                    const isReality = show.type === 'Reality';
                    const hasDatingKeywords = show.genres?.some(g => g.toLowerCase().includes('romance')) || 
                                              show.name?.toLowerCase().includes('dating') || 
                                              show.name?.toLowerCase().includes('love') || 
                                              show.name?.toLowerCase().includes('bachelor') || 
                                              show.summary?.toLowerCase().includes('dating pool') ||
                                              show.summary?.toLowerCase().includes('matchmaker');

                    if (!isReality || !hasDatingKeywords) return false;
                    
                    const airDate = new Date(item.airstamp || `${item.airdate}T${item.airtime || '00:00'}:00`);
                    return airDate >= now && airDate <= oneWeekLater;
                });

                filtered.sort((a, b) => new Date(a.airstamp) - new Date(b.airstamp));

                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="text-[10px] text-gray-500 col-span-full py-6 text-center font-medium">No dating show releases listed for this week.</div>`;
                    return;
                }

                grid.innerHTML = filtered.map(item => {
                    const show = item._embedded.show;
                    const showName = show.name;
                    const epSeason = item.season;
                    const epNumber = item.number;
                    const airTime12 = formatTimeTo12Hour(item.airtime);
                    const airDate = new Date(item.airdate + 'T00:00:00');
                    
                    const diffTime = airDate.getTime() - now.getTime();
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    let relativeDay = '';
                    let relativeBadgeClass = 'calendar-badge';
                    
                    if (diffDays === 0) {
                        relativeDay = 'Today';
                        relativeBadgeClass = 'calendar-badge-today';
                    } else if (diffDays === 1) {
                        relativeDay = 'Tomorrow';
                    } else {
                        relativeDay = airDate.toLocaleDateString('en-US', { weekday: 'long' });
                    }

                    // Compact block render: start time next to relative day badge, no country or network name
                    return `
                        <div class="p-2.5 bg-white/[0.03] border border-white/5 rounded-xl flex flex-col justify-center hover:border-purple-500/40 hover:bg-white/[0.05] transition-all cursor-pointer group"
                             onclick="searchDatingShow('${showName.replace(/'/g, "\\'")}')">
                            <div class="flex items-center justify-between gap-1 mb-1">
                                <span class="text-[8px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded ${relativeBadgeClass} text-white">${relativeDay}</span>
                                <span class="text-[9px] font-bold text-gray-400">${airTime12 || 'TBA'}</span>
                            </div>
                            <h4 class="text-[11px] font-extrabold text-white group-hover:text-purple-400 transition-colors line-clamp-1 mb-0.5">${showName}</h4>
                            <p class="text-[9px] font-medium text-purple-400">S${epSeason} • E${epNumber}</p>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                grid.innerHTML = `<div class="text-[10px] text-red-400 col-span-full py-6 text-center font-semibold">Unable to load weekly release schedules.</div>`;
            }
        }

        async function fetchGenres() {
            const res = await fetch(`https://api.themoviedb.org/3/genre/${state.type}/list?api_key=${CONFIG.TMDB_KEY}`);
            const data = await res.json();
            const genreSelect = document.getElementById('genreSelect');

        async function fetchHistory() {
            const query = new Parse.Query("WatchedItem");
            query.equalTo("user", state.user);
            query.descending("watchedDate");
            try {
                const results = await query.find();
                state.history = {};
                state.permanentWatched = {};
                
                results.forEach(item => {
                    const tmdbId = item.get("tmdbId");
                    const s = item.get("lastWatchedSeason");
                    const e = item.get("lastWatchedEpisode");
                    const isHidden = item.get("hiddenFromHistory") === true;
                    
                    if(!state.history[tmdbId]) state.history[tmdbId] = {};
                    
                    const data = {
                        id: item.id, 
                        obj: item, 
                        type: item.get("mediaType"), 
                        season: s, 
                        episode: e,
                        title: item.get("title"), 
                        poster: item.get("posterPath"), 
                        watchedDate: item.get("watchedDate") || item.updatedAt,
                        hidden: isHidden
                    };

                    if (!isHidden) {
                        state.history[tmdbId][`${s}-${e}`] = data;
                    }
                    
                    if (!state.permanentWatched[tmdbId] || new Date(data.watchedDate) > new Date(state.permanentWatched[tmdbId].watchedDate)) {
                        state.permanentWatched[tmdbId] = data;
                    }
                });
                renderHistory(); 
                renderGallery();
            } catch (e) { console.error(e); }
        }

        function triggerSaveBuffer(item, s = 0, e = 0) {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                performActualSave(item, s, e);
            }, CONFIG.SAVE_BUFFER_MS);
        }

        async function performActualSave(item, s = 0, e = 0) {
            const WatchedItem = Parse.Object.extend("WatchedItem");
            const tmdbId = item.id.toString();
            const key = `${s}-${e}`;
            
            let record;
            if (state.history[tmdbId] && state.history[tmdbId][key]) {
                record = state.history[tmdbId][key].obj;
            } else {
                record = new WatchedItem();
            }

            record.set("user", state.user); 
            record.set("tmdbId", tmdbId); 
            record.set("mediaType", state.type); 
            record.set("lastWatchedSeason", parseInt(s)); 
            record.set("lastWatchedEpisode", parseInt(e)); 
            record.set("title", item.title || item.name); 
            record.set("posterPath", item.poster_path); 
            record.set("watchedDate", new Date());
            record.set("hiddenFromHistory", false);

            try {
                const saved = await record.save();
                const data = { 
                    id: saved.id, 
                    obj: saved, 
                    type: state.type, 
                    season: s, 
                    episode: e, 
                    title: item.title || item.name, 
                    poster: item.poster_path, 
                    watchedDate: new Date(),
                    hidden: false
                };
                
                if(!state.history[tmdbId]) state.history[tmdbId] = {};
                state.history[tmdbId][key] = data;
                state.permanentWatched[tmdbId] = data;
                
                renderHistory(); 
                renderGallery(); 
            } catch (err) { console.error(err); }
        }

        async function deleteHistoryItem(tmdbId, event) {
            event.stopPropagation();
            try {
                const query = new Parse.Query("WatchedItem");
                query.equalTo("user", state.user);
                query.equalTo("tmdbId", tmdbId);
                const results = await query.find();
                
                for (let doc of results) {
                    doc.set("hiddenFromHistory", true);
                }
                await Parse.Object.saveAll(results);
                
                delete state.history[tmdbId];
                
                renderHistory(); 
                renderGallery(); 
                
                if (state.current && state.current.id.toString() === tmdbId) {
                    const s = document.getElementById('seasonSelect').value;
                    const e = document.getElementById('episodeSelect').value;
                    updateEpisodeDropdown(s, e);
                }
            } catch (err) { console.error(err); }
        }

        function renderHistory() {
            const grid = document.getElementById('historyGrid');
            const section = document.getElementById('historySection');
            const uniqueShowsLatest = [];
            
            for (const tmdbId in state.history) {
                const episodes = Object.values(state.history[tmdbId]).filter(x => !x.hidden);
                if (episodes.length === 0) continue;
                const latest = episodes.sort((a,b) => b.watchedDate - a.watchedDate)[0];
                uniqueShowsLatest.push({ tmdbId, ...latest });
            }
            
            const sortedRecent = uniqueShowsLatest.sort((a,b) => b.watchedDate - a.watchedDate).slice(0, 16);
            if (sortedRecent.length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            
            grid.innerHTML = sortedRecent.map((data) => {
                const wDate = new Date(data.watchedDate);
                const formattedDate = isNaN(wDate.getTime()) ? '' : `${wDate.getMonth() + 1}/${wDate.getDate()}/${wDate.getFullYear()}`;

                return `
                <div tabindex="0" class="history-card premium-card group flex items-center gap-2 p-1.5 rounded-lg cursor-pointer select-none" 
                     onclick="loadContent(${data.tmdbId}, '${data.type}', ${data.season}, ${data.episode})">
                    <div onclick="deleteHistoryItem('${data.tmdbId}', event)" class="delete-btn">
                        <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </div>
                    <div class="w-7 h-10 flex-shrink-0 overflow-hidden rounded shadow-sm bg-neutral-900">
                        <img src="https://image.tmdb.org/t/p/w200${data.poster}" class="w-full h-full object-cover">
                    </div>
                    <div class="overflow-hidden min-w-0 flex-1 flex flex-col justify-center">
                        <h4 class="text-[10px] font-bold truncate text-white leading-tight mb-0.5">${data.title}</h4>
                        <div class="flex flex-col gap-0 leading-none">
                             <span class="text-[8px] text-purple-400 font-extrabold uppercase tracking-wide mb-0.5">${data.type === 'tv' ? `S${data.season} E${data.episode}` : 'Movie'}</span>
                             ${formattedDate ? `<span class="text-[7.5px] text-gray-500 font-medium">Watched: ${formattedDate}</span>` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function fetchGallery() {
            let url;
            const regionJoin = allowedCountries.join('|');
            
            if (state.query) {
                url = `https://api.themoviedb.org/3/search/${state.type}?api_key=${CONFIG.TMDB_KEY}&query=${encodeURIComponent(state.query)}&page=${state.page}`;
            } else {
                const yearParam = state.type === 'movie' ? 'primary_release_year' : 'first_air_date_year';
                url = `https://api.themoviedb.org/3/discover/${state.type}?api_key=${CONFIG.TMDB_KEY}&page=${state.page}&sort_by=popularity.desc&with_genres=${state.genre}&${yearParam}=${state.year}&with_origin_country=${regionJoin}`;
            }
            
            const res = await fetch(url); 
            const data = await res.json();
            
            let filteredResults = data.results || [];

            if (state.query) {
                filteredResults = filteredResults.filter(item => {
                    const countries = item.origin_country || [];
                    if (countries.length === 0) return true; 
                    return countries.some(c => allowedCountries.includes(c));
                });
            }

            galleryData = filteredResults; 
            galleryData.forEach(item => fetchLiveDetails(item.id, state.type));
            
            renderGallery();
            document.getElementById('pageTxt').innerText = `Page ${data.page}`;
            document.getElementById('prevBtn').disabled = data.page <= 1;
        }

        async function fetchLiveDetails(tmdbId, mediaType) {
            if (state.liveDetails[tmdbId]) return;
            try {
                const res = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${CONFIG.TMDB_KEY}`);
                if (!res.ok) return;
                const details = await res.json();
                
                let nextEpDate = null;
                let isUpcoming = false;
                let futurePremiereString = null;
                const today = new Date();
                today.setHours(0,0,0,0);

                if (mediaType === 'tv') {
                    if (details.next_episode_to_air) {
                        const airDate = new Date(details.next_episode_to_air.air_date);
                        nextEpDate = `${airDate.getMonth() + 1}/${airDate.getDate()}/${airDate.getFullYear()}`;
                        
                        if (details.next_episode_to_air.episode_number === 1) {
                            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                            const suffix = (airDate.getDate() == 1 || airDate.getDate() == 21 || airDate.getDate() == 31) ? "st" : (airDate.getDate() == 2 || airDate.getDate() == 22) ? "nd" : (airDate.getDate() == 3 || airDate.getDate() == 23) ? "rd" : "th";
                            const formattedPremiereDate = `${months[airDate.getMonth()]} ${airDate.getDate()}${suffix}, ${airDate.getFullYear()}`;
                            futurePremiereString = `Season ${details.next_episode_to_air.season_number} premiere: ${formattedPremiereDate}`;
                        }
                    } else if (details.status === "Returning Series" && details.seasons) {
                        const futureSeason = details.seasons.find(s => s.air_date && new Date(s.air_date) > today);
                        if (futureSeason) {
                            const airDate = new Date(futureSeason.air_date);
                            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                            const suffix = (airDate.getDate() == 1 || airDate.getDate() == 21 || airDate.getDate() == 31) ? "st" : (airDate.getDate() == 2 || airDate.getDate() == 22) ? "nd" : (airDate.getDate() == 3 || airDate.getDate() == 23) ? "rd" : "th";
                            const formattedPremiereDate = `${months[airDate.getMonth()]} ${airDate.getDate()}${suffix}, ${airDate.getFullYear()}`;
                            futurePremiereString = `Season ${futureSeason.season_number} premiere: ${formattedPremiereDate}`;
                        }
                    }
                } else if (mediaType === 'movie') {
                    if (details.release_date) {
                        const relDate = new Date(details.release_date);
                        if (relDate > today) {
                            isUpcoming = true;
                        }
                    }
                }

                state.liveDetails[tmdbId] = {
                    status: details.status,
                    nextEpDate: nextEpDate,
                    isUpcoming: isUpcoming,
                    futurePremiereString: futurePremiereString,
                    releaseDate: details.release_date || details.first_air_date || ''
                };
                
                updateCardVisuals(tmdbId);
            } catch (err) { console.error(err); }
        }

        function updateCardVisuals(tmdbId) {
            const cardWrap = document.getElementById(`card-wrap-${tmdbId}`);
            if (!cardWrap) return;
            
            const live = state.liveDetails[tmdbId];
            if (!live) return;

            const dateLabel = cardWrap.querySelector('.card-release-date');
            if (dateLabel && live.releaseDate) {
                dateLabel.innerText = live.releaseDate;
            }

            const bannerContainer = cardWrap.querySelector('.banner-container');
            if (!bannerContainer) return;
            
            let topBannerHtml = '';
            
            if (live.futurePremiereString) {
                topBannerHtml = `<div class="upcoming-banner text-[6.5px] leading-tight">${live.futurePremiereString}</div>`;
            } 
            else if (live.nextEpDate) {
                topBannerHtml = `<div class="airdate-banner">Next: ${live.nextEpDate}</div>`;
            } 
            else if (live.isUpcoming && live.releaseDate) {
                const [y, m, d] = live.releaseDate.split('-');
                topBannerHtml = `<div class="upcoming-banner">Upcoming: ${m}/${d}/${y}</div>`;
            }

            bannerContainer.innerHTML = topBannerHtml;
        }

        async function loadContent(id, type, s = 1, e = 1) {
            state.type = type; 
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${CONFIG.TMDB_KEY}`);
            state.current = await res.json();
            
            currentTvDetails.id = id;
            currentTvDetails.season = s;
            currentTvDetails.episode = e;

            document.getElementById('playerSection').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = state.current.title || state.current.name;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if (type === 'tv') {
                document.getElementById('tvSelectors').classList.remove('hidden');
                document.getElementById('episodeInfo').classList.remove('hidden');
                document.getElementById('prevEpBtn').classList.remove('hidden');
                document.getElementById('nextEpBtn').classList.remove('hidden');
                const seasons = state.current.seasons.filter(x => x.season_number > 0);
                const sSelect = document.getElementById('seasonSelect');
                sSelect.innerHTML = seasons.map(x => `<option value="${x.season_number}">Season ${x.season_number}</option>`).join('');
                sSelect.value = s; 
                await updateEpisodes(s, e);
            } else {
                document.getElementById('tvSelectors').classList.add('hidden');
                document.getElementById('episodeInfo').classList.add('hidden');
                document.getElementById('prevEpBtn').classList.add('hidden');
                document.getElementById('nextEpBtn').classList.add('hidden');
                document.getElementById('playerSub').innerText = "Movie Stream";
                loadServerIframe("movie", id); 
                triggerSaveBuffer(state.current);
            }
        }

        async function updateEpisodes(sNum, eNum = 1) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${state.current.id}/season/${sNum}?api_key=${CONFIG.TMDB_KEY}`);
            const data = await res.json();
            state.currentEpisodes = data.episodes;
            cachedSeasonEpisodes = data.episodes;
            currentTvDetails.totalEpisodes = data.episodes.length;
            
            currentTvDetails.season = sNum;
            currentTvDetails.episode = eNum;

            updateEpisodeDropdown(sNum, eNum);
            updateEpisodeDetails(eNum);
            loadServerIframe("tv", state.current.id, sNum, eNum); 
            triggerSaveBuffer(state.current, sNum, eNum);
        }

        function updateEpisodeDropdown(sNum, currentENum) {
            const eSelect = document.getElementById('episodeSelect');
            const historyForThisShow = state.history[state.current.id.toString()] || {};
            eSelect.innerHTML = state.currentEpisodes.map(ep => {
                const key = `${sNum}-${ep.episode_number}`;
                const isWatched = !!historyForThisShow[key];
                return `<option value="${ep.episode_number}" class="${isWatched ? 'ep-watched' : ''}">
                    ${isWatched ? '✓ ' : ''}Episode ${ep.episode_number}
                </option>`;
            }).join('');
            if (currentENum) eSelect.value = currentENum;
        }

        function updateEpisodeDetails(eNum) {
            const episode = state.currentEpisodes.find(ep => ep.episode_number == eNum);
            if (!episode) return;
            document.getElementById('playerSub').innerText = `Season ${episode.season_number} • Episode ${eNum}`;
            document.getElementById('epTitleDisplay').innerText = episode.name;
            document.getElementById('epOverview').innerText = episode.overview || "No description available.";
            const sNum = document.getElementById('seasonSelect').value;
            const maxEpisodes = state.currentEpisodes.length;
            const maxSeasons = state.current.seasons.filter(x => x.season_number > 0).length;
            document.getElementById('prevEpBtn').disabled = (eNum <= 1 && sNum <= 1);
            document.getElementById('nextEpBtn').disabled = (eNum >= maxEpisodes && sNum >= maxSeasons);
        }

        function populateSourcesDropdown() {
            const menu = document.getElementById("sources-menu-options");
            if (!menu) return;
            menu.innerHTML = "";
            serversList.forEach(server => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.setAttribute("draggable", "false");
                
                const isActive = server.id === activeServer;
                btn.className = `p-2.5 rounded-lg text-[10px] font-bold transition-all duration-200 flex flex-col items-center justify-center text-center gap-1 border border-white/5 cursor-pointer outline-none ${
                    isActive 
                    ? 'bg-purple-600/30 border-purple-500 text-white shadow-lg shadow-purple-500/10' 
                    : 'bg-white/5 text-slate-300 hover:border-purple-500/50 hover:bg-white/10 hover:text-white'
                }`;

                btn.onclick = () => {
                    selectServer(server.id);
                    menu.classList.add("hidden");
                };

                const nameParts = server.name.split(': ');
                const label = nameParts[0] || 'Server';
                const source = nameParts[1] || server.id;

                btn.innerHTML = `
                    <span class="text-[8px] uppercase tracking-wider text-purple-400 font-extrabold">${label}</span>
                    <span class="text-white truncate max-w-full font-bold">${source}</span>
                `;
                menu.appendChild(btn);
            });
            updateSelectedSourceText();
        }

        function updateSelectedSourceText() {
            const active = serversList.find(s => s.id === activeServer);
            const sourceTextEl = document.getElementById("selected-source-text");
            if (sourceTextEl) {
                sourceTextEl.textContent = active ? active.name : "Select Server";
            }
        }

        function selectServer(serverName) {
            activeServer = serverName;
            updateSelectedSourceText();
            populateSourcesDropdown(); 

            if (state.current) {
                if (state.type === "tv") {
                    const s = document.getElementById('seasonSelect').value || 1;
                    const e = document.getElementById('episodeSelect').value || 1;
                    loadServerIframe("tv", state.current.id, s, e);
                } else {
                    loadServerIframe("movie", state.current.id);
                }
            }
        }

        function loadServerIframe(type, id, season = 1, episode = 1) {
            const playerContainer = document.getElementById("player-wrapper");
            if (!playerContainer) return;
            let streamUrl = "";

            if (type === "movie") {
                switch (activeServer) {
                    case "vixsrc": streamUrl = `https://vixsrc.to/movie/${id}`; break;
                    case "vault": streamUrl = `https://streamvaultsrc.click/embed/movie/${id}`; break;
                    case "xpass": streamUrl = `https://play.xpass.top/e/movie/${id}`; break;
                    case "vaplayer": streamUrl = `https://vaplayer.ru/embed/movie/${id}`; break;
                    case "filmu": streamUrl = `https://embed.filmu.in/movie/${id}`; break;
                    case "videasy": streamUrl = `https://player.videasy.net/movie/${id}?color=8834ec`; break;
                    case "vidfast": streamUrl = `https://www.vidfast.net/movie/${id}`; break;
                    case "cinemaos": streamUrl = `https://cinemaos.tech/player/${id}`; break;
                    case "spencerdevs": streamUrl = `https://spencerdevs.xyz/movie/${id}`; break;
                    case "vyla": streamUrl = `https://vyla.pages.dev/movie/${id}`; break;
                    case "cinezo": streamUrl = `https://api.cinezo.net/movie/${id}`; break;
                    case "oneembed": streamUrl = `https://1embed.cc/embed/movie/${id}`; break;
                    default: streamUrl = `https://vixsrc.to/movie/${id}`;
                }
            } else {
                switch (activeServer) {
                    case "vixsrc": streamUrl = `https://vixsrc.to/tv/${id}/${season}/${episode}`; break;
                    case "vault": streamUrl = `https://streamvaultsrc.click/embed/tv/${id}/${season}/${episode}`; break;
                    case "xpass": streamUrl = `https://play.xpass.top/e/tv/${id}/${season}/${episode}`; break;
                    case "vaplayer": streamUrl = `https://vaplayer.ru/embed/tv/${id}/${season}/${episode}`; break;
                    case "filmu": streamUrl = `https://embed.filmu.in/tv/${id}/${season}/${episode}`; break;
                    case "videasy": streamUrl = `https://player.videasy.net/tv/${id}/${season}/${episode}?autoplayNextEpisode=true&autoPlay=true&nextEpisode=true&color=8834ec`; break;
                    case "vidfast": streamUrl = `https://www.vidfast.net/tv/${id}/${season}/${episode}?autoPlay=true`; break;
                    case "cinemaos": streamUrl = `https://cinemaos.live/tv/watch/${id}&${season}&${episode}`; break;
                    case "spencerdevs": streamUrl = `https://spencerdevs.xyz/tv/${id}/${season}/${episode}`; break;
                    case "vyla": streamUrl = `https://vyla.pages.dev/tv/${id}/${season}/${episode}`; break;
                    case "cinezo": streamUrl = `https://api.cinezo.net/tv/${id}/${season}/${episode}?autoplayNext=true?startAt=630`; break;
                    case "oneembed": streamUrl = `https://1embed.cc/embed/tv/${id}/${season}/${episode}`; break;
                    default: streamUrl = `https://vixsrc.to/tv/${id}/${season}/${episode}`;
                }
            }

            const frameElement = document.createElement('iframe');
            frameElement.src = streamUrl;
            frameElement.className = "w-full h-full border-0 shadow-2xl bg-black rounded-lg";
            frameElement.allowFullscreen = true;
            frameElement.setAttribute("scrolling", "no");
            frameElement.setAttribute("referrerpolicy", "origin");
            frameElement.setAttribute("allow", "autoplay; encrypted-media; picture-in-picture");

            if (noSandboxSources.includes(activeServer)) {
                frameElement.removeAttribute('sandbox');
            } else {
                frameElement.setAttribute('sandbox', 'allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation');
            }

            playerContainer.innerHTML = "";
            playerContainer.appendChild(frameElement);
        }

        async function navigateEpisode(dir) {
            let s = parseInt(document.getElementById('seasonSelect').value);
            let e = parseInt(document.getElementById('episodeSelect').value);
            if (dir === 'next') {
                if (e < state.currentEpisodes.length) { e++; } else {
                    const seasons = state.current.seasons.filter(x => x.season_number > 0);
                    if (s < seasons.length) { s++; e = 1; document.getElementById('seasonSelect').value = s; await updateEpisodes(s, e); return; }
                }
            } else {
                if (e > 1) { e--; } else if (s > 1) {
                    s--; document.getElementById('seasonSelect').value = s;
                    const res = await fetch(`https://api.themoviedb.org/3/tv/${state.current.id}/season/${s}?api_key=${CONFIG.TMDB_KEY}`);
                    const data = await res.json(); e = data.episodes.length; await updateEpisodes(s, e); return;
                }
            }
            document.getElementById('episodeSelect').value = e;
            currentTvDetails.season = s;
            currentTvDetails.episode = e;
            updateEpisodeDetails(e); 
            updateEpisodeDropdown(s, e); 
            loadServerIframe("tv", state.current.id, s, e); 
            triggerSaveBuffer(state.current, s, e);
        }

        function scrollToGallery() {
            const el = document.getElementById('gallerySection');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function setupEvents() {
            document.getElementById('autoscrollBtn').onclick = toggleAutoscroll;

            // Calendar Dropdown Toggle Event
            const calBtn = document.getElementById('calendarToggleBtn');
            const calPanel = document.getElementById('calendarPanel');
            const calArrow = document.getElementById('calendarArrow');
            const calScrollContainer = document.getElementById('calendarScrollContainer');

            calBtn.onclick = (e) => {
                e.stopPropagation();
                calPanel.classList.toggle('hidden');
                calArrow.classList.toggle('rotate-180');
            };

            // Up and Down Navigation Arrow click event listeners (scrolling container smoothly)
            document.getElementById('calScrollUp').onclick = (e) => {
                e.stopPropagation();
                calScrollContainer.scrollBy({ top: -110, behavior: 'smooth' });
            };

            document.getElementById('calScrollDown').onclick = (e) => {
                e.stopPropagation();
                calScrollContainer.scrollBy({ top: 110, behavior: 'smooth' });
            };

            const srvBtn = document.getElementById('serverSelectorBtn');
            const srvMenu = document.getElementById('sources-menu-options');
            srvBtn.onclick = (e) => {
                e.stopPropagation();
                srvMenu.classList.toggle('hidden');
            };

            // Global click window cleanup
            document.addEventListener('click', (e) => {
                if (!calPanel.contains(e.target) && e.target !== calBtn) {
                    calPanel.classList.add('hidden');
                    calArrow.classList.remove('rotate-180');
                }
                if (!srvMenu.contains(e.target) && e.target !== srvBtn) {
                    srvMenu.classList.add('hidden');
                }
            });

            document.getElementById('showMoviesBtn').onclick = () => { 
                state.type = 'movie'; state.page = 1; 
                document.getElementById('showMoviesBtn').classList.add('bg-purple-600', 'text-white');
                document.getElementById('showTvBtn').classList.remove('bg-purple-600', 'text-white');
                document.getElementById('showTvBtn').classList.add('text-gray-400');
                fetchGenres(); fetchGallery(); 
            };
            document.getElementById('showTvBtn').onclick = () => { 
                state.type = 'tv'; state.page = 1; 
                document.getElementById('showTvBtn').classList.add('bg-purple-600', 'text-white');
                document.getElementById('showMoviesBtn').classList.remove('bg-purple-600', 'text-white');
                document.getElementById('showMoviesBtn').classList.add('text-gray-400');
                fetchGenres(); fetchGallery(); 
            };

            let searchTimeout;
            document.getElementById('searchInput').oninput = (e) => { 
                clearTimeout(searchTimeout);
                state.query = e.target.value;
                searchTimeout = setTimeout(() => {
                    state.page = 1;
                    if (state.query) {
                        document.getElementById('genreSelect').value = "";
                        document.getElementById('yearSelect').value = "";
                        state.genre = ""; state.year = "";
                    }
                    fetchGallery();
                }, 400);
            };

            document.getElementById('genreSelect').onchange = (e) => {
                state.genre = e.target.value; state.page = 1;
                state.query = ""; document.getElementById('searchInput').value = "";
                fetchGallery();
            };
            document.getElementById('yearSelect').onchange = (e) => {
                state.year = e.target.value; state.page = 1;
                state.query = ""; document.getElementById('searchInput').value = "";
                fetchGallery();
            };
            document.getElementById('prevBtn').onclick = () => { if (state.page > 1) { state.page--; fetchGallery(); scrollToGallery(); } };
            document.getElementById('nextBtn').onclick = () => { state.page++; fetchGallery(); scrollToGallery(); };
            
            document.getElementById('seasonSelect').onchange = (e) => updateEpisodes(e.target.value);
            document.getElementById('episodeSelect').onchange = (e) => {
                const s = document.getElementById('seasonSelect').value;
                const eVal = e.target.value;
                updateEpisodeDetails(eVal); 
                updateEpisodeDropdown(s, eVal); 
                loadServerIframe("tv", state.current.id, s, eVal); 
                triggerSaveBuffer(state.current, s, eVal);
            };
            document.getElementById('prevEpBtn').onclick = () => navigateEpisode('prev');
            document.getElementById('nextEpBtn').onclick = () => navigateEpisode('next');
            document.getElementById('fullscreenBtn').onclick = () => {
                const iframe = document.querySelector('#player-wrapper iframe');
                if (!iframe) return;
                if (iframe.requestFullscreen) iframe.requestFullscreen();
                else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && document.activeElement && document.activeElement !== document.body) {
                    document.activeElement.click();
                }
            });

            window.addEventListener('message', (event) => {
                if (event.origin !== 'https://streamvaultsrc.click') return;
                const { type, data } = event.data;
                if (type === 'PLAYER_EVENT') {
                    const { player_status, player_info } = data;
                    if (player_status === 'completed' && player_info && player_info.mediaType === 'tv') {
                        navigateEpisode('next');
                    }
                }
            });
        }
        init();
    </script>
</body>
</html>
